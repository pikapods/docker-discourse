name: Build and publish

on:
  workflow_dispatch:
    inputs:
      discourse_version:
        description: "Discourse git ref (e.g. v2026.4.0 or 'release')"
        required: true
        type: string
      ruby_version:
        description: "Ruby minor version"
        required: false
        default: "3.4"
        type: string
      publish:
        description: "Publish to GHCR and Docker Hub after tests pass"
        required: false
        default: true
        type: boolean
      base_digest:
        description: "sha256 of the base image to pin (optional; resolved on-demand otherwise)"
        required: false
        default: ""
        type: string
      revision:
        description: "Manual revision override (e.g. r1). Otherwise computed by reading the prior published label."
        required: false
        default: ""
        type: string

# Serialize builds so revision computation can't race itself: two concurrent
# runs against the same DC_VER would otherwise both read 'r2' and both
# write 'r3'. With concurrency: build, the second run reads the first's
# freshly-pushed label and computes the next number correctly.
concurrency: build

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  DOCKERHUB_IMAGE: docker.io/pikapods/docker-discourse

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      discourse_version: ${{ steps.vars.outputs.discourse_version }}
      ruby_version: ${{ steps.vars.outputs.ruby_version }}
      revision: ${{ steps.revision.outputs.revision }}
      base_digest: ${{ steps.base.outputs.base_digest }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve and validate build args
        id: vars
        run: |
          DC_VER="${{ inputs.discourse_version }}"
          RB_VER="${{ inputs.ruby_version }}"
          # Strict allow-list. Immutable CalVer (vYYYY.M.PATCH) is the
          # auto-dispatch shape; rolling upstream aliases and 40-char SHAs
          # remain as escape hatches for one-off manual builds. The previous
          # regex permitted a trailing -suffix; dropped here so a typo of
          # v2026.5.0-latest is rejected at validation rather than producing
          # a tag that semantically shifts.
          if ! echo "$DC_VER" | grep -Eq '^v[0-9]{4}\.[0-9]+\.[0-9]+$|^(release|stable|beta|tests-passed)$|^[0-9a-f]{40}$'; then
            echo "::error::discourse_version '$DC_VER' does not match an accepted format"
            exit 1
          fi
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "discourse_version=$DC_VER" >>"$GITHUB_OUTPUT"
          echo "ruby_version=$RB_VER"      >>"$GITHUB_OUTPUT"
          echo "build_date=$BUILD_DATE"    >>"$GITHUB_OUTPUT"

      - uses: imjasonh/setup-crane@v0.4

      - name: Resolve base image digest
        id: base
        env:
          RB_VER: ${{ steps.vars.outputs.ruby_version }}
          INPUT_DIGEST: ${{ inputs.base_digest }}
        run: |
          set -euo pipefail
          BASE_REF="ruby:${RB_VER}-slim-trixie"
          if [ -n "${INPUT_DIGEST}" ]; then
            digest="${INPUT_DIGEST}"
            echo "using digest provided by caller: ${digest}"
          else
            digest=$(crane digest "${BASE_REF}")
            echo "resolved current digest: ${digest}"
          fi
          echo "base_digest=${digest}" >>"$GITHUB_OUTPUT"
          echo "base_image=${BASE_REF}@${digest}" >>"$GITHUB_OUTPUT"

      - name: Compute image revision
        id: revision
        env:
          DC_VER: ${{ steps.vars.outputs.discourse_version }}
          INPUT_REVISION: ${{ inputs.revision }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_REVISION}" ]; then
            echo "revision=${INPUT_REVISION}" >>"$GITHUB_OUTPUT"
            echo "using revision override: ${INPUT_REVISION}"
            exit 0
          fi
          # Read the published mutable tag's image.version label
          # (form: <discourse-version>-<revision>, e.g. v2026.4.0-r1).
          # Increment the trailing rN. Missing tag, missing label, or
          # non-rN suffix all fall back to r1 — covers first builds and
          # legacy images published before the -rN scheme rolled out.
          REF="${GHCR_IMAGE}:${DC_VER}"
          if cfg=$(crane config "${REF}" 2>/dev/null); then
            prev=$(echo "${cfg}" | jq -r '.config.Labels["org.opencontainers.image.version"] // empty')
            prev_rev="${prev##*-}"
            case "${prev_rev}" in
              r[0-9]*)
                next=$(( ${prev_rev#r} + 1 ))
                revision="r${next}"
                ;;
              *)
                revision="r1"
                ;;
            esac
          else
            revision="r1"
          fi
          echo "computed revision: ${revision} (prev label: ${prev:-<none>})"
          echo "revision=${revision}" >>"$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Build image (local load)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          platforms: linux/amd64
          build-args: |
            DISCOURSE_VERSION=${{ steps.vars.outputs.discourse_version }}
            RUBY_VERSION=${{ steps.vars.outputs.ruby_version }}
            BASE_IMAGE=${{ steps.base.outputs.base_image }}
            BASE_DIGEST=${{ steps.base.outputs.base_digest }}
            IMAGE_REVISION=${{ steps.revision.outputs.revision }}
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ steps.vars.outputs.build_date }}
          tags: docker-discourse:test
          provenance: false

      - name: Save image tarball
        run: docker save docker-discourse:test -o /tmp/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: image
          path: /tmp/image.tar
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test deps
        run: pip install -r tests/requirements.txt

      - name: Fast image tests
        env:
          IMAGE: docker-discourse:test
        run: pytest -v tests/ -m "not runtime" --junitxml=report-image.xml

      - name: Runtime tests (boots real pg + redis)
        env:
          IMAGE: docker-discourse:test
        run: pytest -v tests/test_runtime.py -m runtime --junitxml=report-runtime.xml

      - name: Dump discourse container logs on failure
        if: failure()
        run: |
          for c in $(docker ps -a --filter "name=^dc-app-" --format '{{.Names}}'); do
            echo "--- $c ---"
            docker logs "$c" 2>&1 || true
          done

      - name: Upload pytest reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-reports
          path: report-*.xml
          retention-days: 7

  compose-test:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Generate secret_key_base
        # Export to GITHUB_ENV so every later step (compose up, log dump,
        # tear down) sees it — compose.yaml uses ${VAR:?...} validation.
        run: echo "DISCOURSE_SECRET_KEY_BASE=$(openssl rand -hex 64)" >>"$GITHUB_ENV"

      - name: Bring up compose stack
        env:
          DISCOURSE_IMAGE: docker-discourse:test
        run: docker compose up -d

      - name: Wait for /srv/status to return 200
        # 10 min ceiling: first boot runs db:migrate against an empty DB
        # plus pitchfork warm-up; healthcheck start_period is already 180s.
        run: |
          for i in $(seq 1 300); do
            code=$(curl -sf -o /dev/null -w '%{http_code}' http://localhost:3000/srv/status || echo "000")
            if [ "$code" = "200" ]; then
              echo "ready after ${i} polls"
              exit 0
            fi
            sleep 2
          done
          echo "timed out waiting for /srv/status"
          docker compose ps
          docker compose logs --tail=200 discourse
          exit 1

      - name: Assert healthcheck propagated
        run: |
          for i in $(seq 1 24); do
            status=$(docker inspect --format '{{.State.Health.Status}}' discourse-discourse-1)
            echo "health status: $status"
            [ "$status" = "healthy" ] && exit 0
            [ "$status" = "unhealthy" ] && exit 1
            sleep 5
          done
          exit 1

      - name: Assert clean first boot
        run: |
          restarts=$(docker inspect --format '{{.RestartCount}}' discourse-discourse-1)
          [ "$restarts" = "0" ] || exit 1
          if docker compose logs discourse 2>&1 | grep -E 'not reachable|FATAL|Restarting'; then
            exit 1
          fi

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  publish:
    needs: [build, test, compose-test]
    if: inputs.publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Push refs to each registry:
      #   <version>-<revision>   immutable (e.g. v2026.4.0-r2). This exact
      #                          build, never reused. Pin here for byte-for-byte
      #                          reproducibility.
      #   <version>              mutable CalVer alias (e.g. v2026.4.0). Floats
      #                          to the latest revision so base-image security
      #                          rebuilds land in place — users pinned here
      #                          receive Debian/Ruby patches without re-pinning.
      #   latest                 floating pointer. The dispatch regex above and
      #                          the upstream-watch filter both restrict to
      #                          immutable CalVer, so 'latest' only ever moves
      #                          to a real stable release.
      - name: Tag and push
        env:
          DC_VER: ${{ needs.build.outputs.discourse_version }}
          REVISION: ${{ needs.build.outputs.revision }}
        run: |
          set -euo pipefail
          for REPO in "${GHCR_IMAGE}" "${DOCKERHUB_IMAGE}"; do
            docker tag docker-discourse:test "${REPO}:${DC_VER}-${REVISION}"
            docker tag docker-discourse:test "${REPO}:${DC_VER}"
            docker tag docker-discourse:test "${REPO}:latest"
            docker push "${REPO}:${DC_VER}-${REVISION}"
            docker push "${REPO}:${DC_VER}"
            docker push "${REPO}:latest"
          done
